<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang chủ - Secondhand Shop</title>
    <link rel="stylesheet" href="css/user-style.css">
</head>
<body>
    <!-- HEADER -->
    <header class="main-header">
        <div class="header-container">
            <div class="header-left">
                <a href="index.html" class="logo">
                    <span class="logo-icon">🛍️</span>
                    <span>Secondhand Shop</span>
                </a>
                
                <nav class="main-nav">
                    <ul>
                        <li><a href="index.html" class="active">Trang chủ</a></li>
                        <li><a href="products.html">Sản phẩm</a></li>
                    </ul>
                </nav>
            </div>
            
            <div class="header-right">
    <a href="cart.html" class="cart-wrapper-minimal">
        <svg class="cart-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="9" cy="21" r="1"></circle>
            <circle cx="20" cy="21" r="1"></circle>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
        </svg>
        <span class="cart-badge-minimal" id="cartBadge">0</span>
    </a>
    
    <div id="userMenu">
        </div>
</div>
        </div>
    </header>

    <!-- HERO SECTION -->
    <section class="hero">
        <div class="hero-content">
            <h1>Secondhand Shop</h1>
            <p>Nơi mua bán đồ cũ uy tín, chất lượng, giá rẻ</p>
            
            <div class="search-box">
                <input type="text" 
                       id="searchInput" 
                       placeholder="Tìm kiếm sản phẩm..."
                       onkeypress="handleSearchKeypress(event)">
                <button onclick="searchProducts()">🔍 Tìm kiếm</button>
            </div>
        </div>
    </section>

    <!-- MAIN CONTENT -->
    <main class="container">
        <h2 class="section-title">Sản phẩm mới nhất</h2>
        
        <div id="productsContainer" class="products-grid">
            <div class="loading">
                <div class="spinner"></div>
                <p>Đang tải sản phẩm...</p>
            </div>
        </div>

        <div style="text-align: center; margin-top: 3rem;">
            <a href="products.html" class="btn btn-primary">
                Xem tất cả sản phẩm →
            </a>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="main-footer">
        <p>&copy; 2026 Secondhand Shop. All rights reserved.</p>
    </footer>

    <!-- SCRIPTS -->
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/cart.js"></script>
    <script>
        // Load products on page load
        document.addEventListener('DOMContentLoaded', async function() {
            await loadLatestProducts();
        });

        // Load latest products
        async function loadLatestProducts() {
            try {
                const products = await fetchGet(API_ENDPOINTS.PRODUCTS_LATEST);
                renderProducts(products.slice(0, 8));
            } catch (error) {
                console.error('Error loading products:', error);
                document.getElementById('productsContainer').innerHTML = 
                    '<p style="text-align: center;">Lỗi khi tải sản phẩm</p>';
            }
        }

        // Render products
        function renderProducts(products) {
            const container = document.getElementById('productsContainer');
            
            if (products.length === 0) {
                container.innerHTML = '<p style="text-align: center;">Chưa có sản phẩm nào</p>';
                return;
            }

            container.innerHTML = products.map(product => {
                const discount = product.originalPrice ? 
                    Math.round((1 - product.price / product.originalPrice) * 100) : 0;
                
                return `
                    <div class="product-card" onclick="viewProductDetail(${product.id})">
                        ${discount > 0 ? `<div class="product-badge">-${discount}%</div>` : ''}
                        <div class="product-image-wrapper">
                            <img src="${product.imageUrl || '../images/placeholder.png'}" 
                                 alt="${product.name}" 
                                 class="product-image">
                        </div>
                        <div class="product-info">
                            <div class="product-category">${product.categoryName}</div>
                            <div class="product-name">${product.name}</div>
                            <div class="product-price-section">
                                <span class="product-price">${formatCurrency(product.price)}</span>
                                ${product.originalPrice ? `
                                    <span class="product-original-price">${formatCurrency(product.originalPrice)}</span>
                                ` : ''}
                            </div>
                            <a href="cart.html" class="cart-wrapper-minimal">
    <svg class="cart-svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="9" cy="21" r="1"></circle>
        <circle cx="20" cy="21" r="1"></circle>
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
    </svg>
    <span class="cart-badge-minimal" id="cartBadge">0</span>
</a>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function viewProductDetail(id) {
            window.location.href = `product-detail.html?id=${id}`;
        }

        function searchProducts() {
            const keyword = document.getElementById('searchInput').value.trim();
            if (keyword) {
                window.location.href = `products.html?search=${encodeURIComponent(keyword)}`;
            }
        }

        function handleSearchKeypress(event) {
            if (event.key === 'Enter') {
                searchProducts();
            }
        }
    </script>
</body>
</html>
