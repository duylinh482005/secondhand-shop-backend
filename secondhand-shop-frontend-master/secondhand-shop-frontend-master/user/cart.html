<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ hàng - Secondhand Shop</title>
    <link rel="stylesheet" href="css/user-style.css">
    <style>
        body { background: #f5f5f5; }

        .cart-page-wrapper {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 16px 40px;
        }

        .cart-page-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ===== HEADER ROW ===== */
        .cart-header-row {
            background: white;
            border-radius: 8px;
            padding: 14px 20px;
            display: grid;
            grid-template-columns: 40px 2fr 1fr 160px 1fr 80px;
            align-items: center;
            font-size: 0.85rem;
            color: #888;
            font-weight: 500;
            margin-bottom: 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }

        /* ===== CART ITEM CARD ===== */
        .cart-item-card {
            background: white;
            border-radius: 8px;
            margin-bottom: 10px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            overflow: hidden;
            transition: box-shadow 0.2s;
        }

        .cart-item-card:hover {
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }

        .cart-item-row {
            display: grid;
            grid-template-columns: 40px 2fr 1fr 160px 1fr 80px;
            align-items: center;
            padding: 16px 20px;
            gap: 8px;
        }

        /* ===== CHECKBOX ===== */
        .cart-checkbox-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cart-checkbox {
            width: 18px;
            height: 18px;
            border: 2px solid #ccc;
            border-radius: 3px;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            position: relative;
            transition: all 0.15s;
            flex-shrink: 0;
        }

        .cart-checkbox:checked {
            background: #ee4d2d;
            border-color: #ee4d2d;
        }

        .cart-checkbox:checked::after {
            content: '';
            position: absolute;
            left: 4px;
            top: 1px;
            width: 6px;
            height: 10px;
            border: 2px solid white;
            border-top: none;
            border-left: none;
            transform: rotate(45deg);
        }

        /* ===== PRODUCT INFO ===== */
        .cart-product-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .cart-product-img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 6px;
            border: 1px solid #eee;
            flex-shrink: 0;
        }

        .cart-product-name {
            font-size: 0.9rem;
            color: #222;
            font-weight: 500;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* ===== PRICE ===== */
        .cart-unit-price {
            font-size: 0.95rem;
            color: #555;
            text-align: center;
        }

        /* ===== QUANTITY CONTROLS ===== */
        .qty-controls {
            display: flex;
            align-items: center;
            border: 1px solid #ddd;
            border-radius: 4px;
            overflow: hidden;
            width: fit-content;
            margin: 0 auto;
        }

        .qty-btn {
            width: 32px;
            height: 32px;
            background: #f5f5f5;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
        }

        .qty-btn:hover { background: #e0e0e0; }

        .qty-input {
            width: 44px;
            height: 32px;
            text-align: center;
            border: none;
            border-left: 1px solid #ddd;
            border-right: 1px solid #ddd;
            font-size: 0.9rem;
            color: #333;
            outline: none;
        }

        /* ===== SUBTOTAL ===== */
        .cart-subtotal {
            font-size: 0.95rem;
            color: #ee4d2d;
            font-weight: 600;
            text-align: center;
        }

        /* ===== DELETE ===== */
        .cart-delete-btn {
            background: none;
            border: none;
            color: #999;
            cursor: pointer;
            font-size: 0.85rem;
            padding: 6px 8px;
            border-radius: 4px;
            transition: color 0.15s, background 0.15s;
            text-align: center;
            display: block;
            margin: 0 auto;
        }

        .cart-delete-btn:hover {
            color: #ee4d2d;
            background: #fff0ee;
        }

        /* ===== STICKY BOTTOM BAR ===== */
        .cart-bottom-bar {
            position: sticky;
            bottom: 0;
            background: white;
            border-top: 2px solid #ee4d2d;
            border-radius: 0 0 8px 8px;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 -4px 16px rgba(0,0,0,0.1);
            margin-top: 12px;
            z-index: 100;
        }

        .bottom-bar-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .select-all-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: #333;
            cursor: pointer;
            font-weight: 500;
        }

        .selected-count {
            font-size: 0.85rem;
            color: #888;
        }

        .bottom-bar-right {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .total-label {
            font-size: 0.9rem;
            color: #555;
        }

        .total-value {
            font-size: 1.3rem;
            font-weight: 700;
            color: #ee4d2d;
        }

        .checkout-btn {
            background: #ee4d2d;
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 4px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            white-space: nowrap;
        }

        .checkout-btn:hover { background: #d73211; }
        .checkout-btn:active { transform: scale(0.98); }
        .checkout-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        /* ===== EMPTY CART ===== */
        .empty-cart {
            text-align: center;
            padding: 80px 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }

        .empty-cart-icon { font-size: 5rem; margin-bottom: 16px; }
        .empty-cart h2 { font-size: 1.2rem; color: #555; margin-bottom: 8px; }
        .empty-cart p { color: #999; margin-bottom: 24px; }

        .btn-shop-now {
            background: #ee4d2d;
            color: white;
            padding: 12px 32px;
            border-radius: 4px;
            text-decoration: none;
            font-weight: 600;
            display: inline-block;
            transition: background 0.2s;
        }

        .btn-shop-now:hover { background: #d73211; }

        /* ===== ITEM SELECTED STATE ===== */
        .cart-item-card.selected {
            outline: 1.5px solid #ee4d2d;
        }

        @media (max-width: 768px) {
            .cart-header-row { display: none; }
            .cart-item-row {
                grid-template-columns: 30px 1fr;
                grid-template-rows: auto auto auto;
                gap: 10px;
            }
            .cart-unit-price,
            .qty-controls,
            .cart-subtotal,
            .cart-delete-btn {
                grid-column: 2;
            }
            .cart-bottom-bar {
                flex-direction: column;
                gap: 12px;
                align-items: stretch;
            }
            .checkout-btn { width: 100%; }
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <header class="main-header">
        <div class="header-container">
            <div class="header-left">
                <a href="index.html" class="logo">
                    <span class="logo-icon">🛍️</span>
                    <span>Secondhand Shop</span>
                </a>
                <nav class="main-nav">
                    <ul>
                        <li><a href="index.html">Trang chủ</a></li>
                        <li><a href="products.html">Sản phẩm</a></li>
                    </ul>
                </nav>
            </div>
            <div class="header-right">
                <a href="cart.html" class="cart-wrapper-minimal">
                    <svg class="cart-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="9" cy="21" r="1"></circle>
                        <circle cx="20" cy="21" r="1"></circle>
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                    </svg>
                    <span class="cart-badge-minimal" id="cartBadge">0</span>
                </a>
                <div id="userMenu"></div>
            </div>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <div class="cart-page-wrapper">
        <div class="cart-page-title">🛒 Giỏ hàng của bạn</div>

        <div id="cartContent"></div>
    </div>

    <!-- FOOTER -->
    <footer class="main-footer">
        <p>&copy; 2026 Secondhand Shop. All rights reserved.</p>
    </footer>

    <!-- SCRIPTS -->
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/cart.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            renderCart();
            updateCartBadge();
        });

        function renderCart() {
            const cart = getCart();
            const contentDiv = document.getElementById('cartContent');

            if (cart.length === 0) {
                contentDiv.innerHTML = `
                    <div class="empty-cart">
                        <div class="empty-cart-icon">🛒</div>
                        <h2>Giỏ hàng trống</h2>
                        <p>Bạn chưa có sản phẩm nào trong giỏ hàng</p>
                        <a href="products.html" class="btn-shop-now">Mua sắm ngay</a>
                    </div>
                `;
                return;
            }

            // Header row
            const headerRow = `
                <div class="cart-header-row">
                    <div></div>
                    <div>Sản Phẩm</div>
                    <div style="text-align:center">Đơn Giá</div>
                    <div style="text-align:center">Số Lượng</div>
                    <div style="text-align:center">Số Tiền</div>
                    <div style="text-align:center">Thao Tác</div>
                </div>
            `;

            // Items
            const itemsHtml = cart.map((item, index) => `
                <div class="cart-item-card" id="card-${item.productId}">
                    <div class="cart-item-row">
                        <div class="cart-checkbox-wrapper">
                            <input type="checkbox"
                                   class="cart-checkbox item-checkbox"
                                   data-id="${item.productId}"
                                   onchange="onItemCheck(this, ${item.productId})">
                        </div>
                        <div class="cart-product-info">
                            <img src="${item.imageUrl || 'images/placeholder.png'}"
                                 onerror="this.src='images/placeholder.png'"
                                 alt="${item.productName}"
                                 class="cart-product-img">
                            <span class="cart-product-name">${item.productName}</span>
                        </div>
                        <div class="cart-unit-price">${formatCurrency(item.price)}</div>
                        <div style="display:flex;justify-content:center;">
                            <div class="qty-controls">
                                <button class="qty-btn" onclick="changeQty(${item.productId}, ${item.quantity - 1})">−</button>
                                <input type="number"
                                       class="qty-input"
                                       value="${item.quantity}"
                                       min="1"
                                       onchange="changeQty(${item.productId}, parseInt(this.value) || 1)">
                                <button class="qty-btn" onclick="changeQty(${item.productId}, ${item.quantity + 1})">+</button>
                            </div>
                        </div>
                        <div class="cart-subtotal" id="subtotal-${item.productId}">
                            ${formatCurrency(item.price * item.quantity)}
                        </div>
                        <div>
                            <button class="cart-delete-btn" onclick="removeItem(${item.productId}, '${item.productName}')">
                                Xóa
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');

            // Bottom sticky bar
            const bottomBar = `
                <div class="cart-bottom-bar">
                    <div class="bottom-bar-left">
                        <label class="select-all-label">
                            <input type="checkbox" class="cart-checkbox" id="selectAll" onchange="toggleSelectAll(this)">
                            Chọn Tất Cả (${cart.length})
                        </label>
                        <span class="selected-count" id="selectedCount">Đã chọn 0 sản phẩm</span>
                    </div>
                    <div class="bottom-bar-right">
                        <div>
                            <span class="total-label">Tổng thanh toán: </span>
                            <span class="total-value" id="selectedTotal">0đ</span>
                        </div>
                        <button class="checkout-btn" onclick="proceedToCheckout()" id="checkoutBtn" disabled>
                            Mua Hàng
                        </button>
                    </div>
                </div>
            `;

            contentDiv.innerHTML = headerRow + itemsHtml + bottomBar;
        }

        function onItemCheck(checkbox, productId) {
            const card = document.getElementById('card-' + productId);
            if (checkbox.checked) {
                card.classList.add('selected');
            } else {
                card.classList.remove('selected');
            }
            updateSelectedTotal();
            syncSelectAll();
        }

        function toggleSelectAll(selectAllCheckbox) {
            const itemCheckboxes = document.querySelectorAll('.item-checkbox');
            itemCheckboxes.forEach(cb => {
                cb.checked = selectAllCheckbox.checked;
                const productId = cb.dataset.id;
                const card = document.getElementById('card-' + productId);
                if (selectAllCheckbox.checked) {
                    card.classList.add('selected');
                } else {
                    card.classList.remove('selected');
                }
            });
            updateSelectedTotal();
        }

        function syncSelectAll() {
            const itemCheckboxes = document.querySelectorAll('.item-checkbox');
            const checkedCount = document.querySelectorAll('.item-checkbox:checked').length;
            const selectAll = document.getElementById('selectAll');
            if (selectAll) {
                selectAll.checked = checkedCount === itemCheckboxes.length && itemCheckboxes.length > 0;
                selectAll.indeterminate = checkedCount > 0 && checkedCount < itemCheckboxes.length;
            }
        }

        function updateSelectedTotal() {
            const cart = getCart();
            const checkedIds = [...document.querySelectorAll('.item-checkbox:checked')].map(cb => parseInt(cb.dataset.id));
            const selectedItems = cart.filter(item => checkedIds.includes(item.productId));
            const total = selectedItems.reduce((sum, item) => sum + item.price * item.quantity, 0);

            const totalEl = document.getElementById('selectedTotal');
            const countEl = document.getElementById('selectedCount');
            const checkoutBtn = document.getElementById('checkoutBtn');

            if (totalEl) totalEl.textContent = formatCurrency(total);
            if (countEl) countEl.textContent = `Đã chọn ${checkedIds.length} sản phẩm`;
            if (checkoutBtn) checkoutBtn.disabled = checkedIds.length === 0;
        }

        function changeQty(productId, newQty) {
            if (newQty < 1) {
                removeItem(productId, '');
                return;
            }
            updateCartQuantity(productId, newQty);
        }

        function removeItem(productId, productName) {
            const name = productName || 'sản phẩm này';
            if (confirm(`Bạn có chắc muốn xóa "${name}" khỏi giỏ hàng?`)) {
                removeFromCart(productId);
                showNotification('Đã xóa sản phẩm!', 'success');
            }
        }

        function proceedToCheckout() {
            const checkedIds = [...document.querySelectorAll('.item-checkbox:checked')].map(cb => parseInt(cb.dataset.id));
            if (checkedIds.length === 0) {
                showNotification('Vui lòng chọn ít nhất 1 sản phẩm!', 'warning');
                return;
            }

            if (!isLoggedIn()) {
                showNotification('Vui lòng đăng nhập để tiếp tục!', 'warning');
                setTimeout(() => { window.location.href = '../login.html'; }, 1500);
                return;
            }

            // Lưu danh sách sản phẩm được chọn vào localStorage để checkout dùng
            localStorage.setItem('checkoutItems', JSON.stringify(checkedIds));
            window.location.href = 'checkout.html';
        }
    </script>
</body>
</html>
