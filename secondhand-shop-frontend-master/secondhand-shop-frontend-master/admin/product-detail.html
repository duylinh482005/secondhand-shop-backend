<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết sản phẩm - Secondhand Shop</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/products.css">
    <link rel="stylesheet" href="./css/responsive.css">
</head>
<body>
    <!-- HEADER -->
    <header>
        <div class="header-container">
            <div class="logo">
                <h1>🛍️ Secondhand Shop</h1>
                <p>Hệ thống quản lý bán hàng 2hand</p>
            </div>
            <nav>
                <ul>
                    <li><a href="index.html">Trang chủ</a></li>
                    <li><a href="categories.html">Danh mục</a></li>
                    <li><a href="products.html" class="active">Sản phẩm</a></li>
                    <li><a href="orders.html">Đơn hàng</a></li>
                    <li><a href="customers.html">Khách hàng</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="container">
        <div class="card">
            <button class="btn btn-secondary" onclick="history.back()" style="margin-bottom: 1rem;">
                ← Quay lại
            </button>
            
            <div id="productDetailContainer">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Đang tải thông tin sản phẩm...</p>
                </div>
            </div>
        </div>

        <!-- RELATED PRODUCTS -->
        <div class="card" id="relatedProductsSection" style="display: none;">
            <div class="card-header">
                <h2 class="card-title">Sản phẩm liên quan</h2>
            </div>
            <div id="relatedProducts" class="grid grid-4">
                <!-- Related products will be loaded here -->
            </div>
        </div>
    </main>

    <!-- SCRIPTS -->
    <script src="./js/config.js"></script>
    <script src="./js/api.js"></script>
    <script>
        // ===================================
        // PRODUCT DETAIL PAGE LOGIC
        // ===================================
        
        let currentProduct = null;

        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');
            
            if (productId) {
                loadProductDetail(productId);
            } else {
                document.getElementById('productDetailContainer').innerHTML = 
                    '<p>Không tìm thấy sản phẩm</p>';
            }
        });

        // Load product detail
        async function loadProductDetail(id) {
            try {
                currentProduct = await fetchGet(`${API_ENDPOINTS.PRODUCTS}/${id}`);
                renderProductDetail(currentProduct);
                loadRelatedProducts(currentProduct.categoryId, id);
            } catch (error) {
                document.getElementById('productDetailContainer').innerHTML = 
                    '<p>Lỗi khi tải thông tin sản phẩm</p>';
            }
        }

        // Render product detail
        function renderProductDetail(product) {
            const discount = product.originalPrice ? 
                Math.round((1 - product.price / product.originalPrice) * 100) : 0;
            
            const container = document.getElementById('productDetailContainer');
            container.innerHTML = `
                <div class="product-detail-grid">
                    <div>
                        <img src="${product.imageUrl || 'images/placeholder.png'}" 
                             alt="${product.name}" 
                             class="product-detail-image">
                    </div>
                    
                    <div class="product-detail-info">
                        <div class="product-category-tag">${product.categoryName}</div>
                        <h2>${product.name}</h2>
                        
                        <div class="product-price-section">
                            <div class="product-detail-price">${formatCurrency(product.price)}</div>
                            ${product.originalPrice ? `
                                <div class="product-old-price">${formatCurrency(product.originalPrice)}</div>
                                <div class="product-discount">-${discount}%</div>
                            ` : ''}
                        </div>
                        
                        <div class="product-detail-meta">
                            <div class="meta-item">
                                <span class="meta-label">Tình trạng</span>
                                <span class="meta-value">${getConditionText(product.conditionStatus)}</span>
                            </div>
                            <div class="meta-item">
                                <span class="meta-label">Số lượng</span>
                                <span class="meta-value">${product.quantity}</span>
                            </div>
                            <div class="meta-item">
                                <span class="meta-label">Trạng thái</span>
                                <span class="badge badge-${getStatusBadgeClass(product.status)}">
                                    ${getStatusText(product.status)}
                                </span>
                            </div>
                            <div class="meta-item">
                                <span class="meta-label">Lượt xem</span>
                                <span class="meta-value">${product.views || 0}</span>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <strong>Người bán:</strong> ${product.sellerName}
                        </div>
                        
                        <div class="form-group">
                            <strong>Mô tả:</strong>
                            <p>${product.description || 'Không có mô tả'}</p>
                        </div>
                        
                        <div class="order-actions">
                            ${product.status === 'AVAILABLE' ? `
                                <button class="btn btn-primary" onclick="addToCart(${product.id})">
                                    🛒 Thêm vào giỏ
                                </button>
                                <button class="btn btn-danger" onclick="buyNow(${product.id})">
                                    💳 Mua ngay
                                </button>
                            ` : `
                                <button class="btn btn-secondary" disabled>
                                    Sản phẩm không khả dụng
                                </button>
                            `}
                        </div>
                    </div>
                </div>
            `;
        }

        // Load related products
        async function loadRelatedProducts(categoryId, excludeId) {
            try {
                const products = await fetchGet(API_ENDPOINTS.PRODUCTS_BY_CATEGORY(categoryId));
                const related = products.filter(p => p.id != excludeId && p.status === 'AVAILABLE').slice(0, 4);
                
                if (related.length > 0) {
                    document.getElementById('relatedProductsSection').style.display = 'block';
                    
                    const container = document.getElementById('relatedProducts');
                    container.innerHTML = related.map(product => `
                        <div class="product-card" onclick="location.href='product-detail.html?id=${product.id}'">
                            <img src="${product.imageUrl || 'images/placeholder.png'}" 
                                 alt="${product.name}" 
                                 class="product-image">
                            <div class="product-info">
                                <div class="product-name">${product.name}</div>
                                <div class="product-price">${formatCurrency(product.price)}</div>
                                <span class="badge badge-success">Còn hàng</span>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('Error loading related products:', error);
            }
        }

        // Add to cart (placeholder)
        function addToCart(productId) {
            showNotification('Chức năng giỏ hàng đang phát triển', 'warning');
        }

        // Buy now (placeholder)
        function buyNow(productId) {
            window.location.href = `orders.html?product=${productId}`;
        }

        // Helper functions
        function getConditionText(condition) {
            const texts = {
                'NEW': 'Mới',
                'LIKE_NEW': 'Như mới',
                'GOOD': 'Tốt',
                'FAIR': 'Khá',
                'POOR': 'Cũ'
            };
            return texts[condition] || condition;
        }

        function getStatusBadgeClass(status) {
            const classes = {
                'AVAILABLE': 'success',
                'SOLD': 'secondary',
                'RESERVED': 'warning',
                'DELETED': 'danger'
            };
            return classes[status] || 'secondary';
        }

        function getStatusText(status) {
            const texts = {
                'AVAILABLE': 'Còn hàng',
                'SOLD': 'Đã bán',
                'RESERVED': 'Đã đặt',
                'DELETED': 'Đã xóa'
            };
            return texts[status] || status;
        }
    </script>
</body>
</html>
