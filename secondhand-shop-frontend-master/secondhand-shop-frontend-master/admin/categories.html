<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý danh mục - Secondhand Shop</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <!-- HEADER -->
    <header>
        <div class="header-container">
            <div class="logo">
                <h1>🛍️ Secondhand Shop</h1>
                <p>Hệ thống quản lý bán hàng 2hand</p>
            </div>
            <nav>
                <ul>
                    <li><a href="index.html">Trang chủ</a></li>
                    <li><a href="categories.html" class="active">Danh mục</a></li>
                    <li><a href="products.html">Sản phẩm</a></li>
                    <li><a href="orders.html">Đơn hàng</a></li>
                    <li><a href="customers.html">Khách hàng</a></li>
                    <li><a href="#" onclick="logoutAdmin()" style="color:#ff4d4d">🚪 Đăng xuất</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="container">
        <div class="card">
            <div class="card-header">
                <h1 class="card-title">📁 Quản lý danh mục</h1>
                <button class="btn btn-primary" onclick="openCategoryModal()">
                    ➕ Thêm danh mục
                </button>
            </div>

            <!-- SEARCH -->
            <div class="form-group">
                <input type="text" 
                       id="searchInput" 
                       placeholder="🔍 Tìm kiếm danh mục..." 
                       onkeyup="searchCategories()">
            </div>

            <!-- TABLE -->
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Hình ảnh</th>
                            <th>Tên danh mục</th>
                            <th>Mô tả</th>
                            <th>Trạng thái</th>
                            <th>Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="categoriesTableBody">
                        <tr>
                            <td colspan="6" class="loading">
                                <div class="spinner"></div>
                                <p>Đang tải dữ liệu...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- MODAL ADD/EDIT CATEGORY -->
    <div id="categoryModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">Thêm danh mục mới</h2>
                <button class="close-btn" onclick="closeCategoryModal()">&times;</button>
            </div>
            <form id="categoryForm" onsubmit="submitCategory(event)">
                <input type="hidden" id="categoryId">
                
                <div class="form-group">
                    <label for="categoryName">Tên danh mục <span style="color: red;">*</span></label>
                    <input type="text" 
                           id="categoryName" 
                           placeholder="Nhập tên danh mục" 
                           required>
                </div>

                <div class="form-group">
                    <label for="categoryDescription">Mô tả</label>
                    <textarea id="categoryDescription" 
                              placeholder="Nhập mô tả danh mục"></textarea>
                </div>

                <div class="form-group">
                    <label for="categoryImageUrl">URL hình ảnh</label>
                    <input type="text" 
                           id="categoryImageUrl" 
                           placeholder="https://example.com/image.jpg">
                </div>

                <div class="form-group">
                    <label for="categoryStatus">Trạng thái</label>
                    <select id="categoryStatus">
                        <option value="ACTIVE">Hoạt động</option>
                        <option value="INACTIVE">Không hoạt động</option>
                    </select>
                </div>

                <div class="form-group">
                    <button type="submit" class="btn btn-primary" style="width: 100%;">
                        💾 Lưu danh mục
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="./js/config.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/api.js"></script>
    <script src="./js/categories.js"></script>
</body>
</html>
